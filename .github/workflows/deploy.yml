name: Deploy Kloudshef Backend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "target/backend-0.0.1-SNAPSHOT.jar"
          target: "/opt/kloudshef/target/"

      - name: Write Firebase credentials & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # Write Firebase credentials from GitHub secret
            mkdir -p /opt/kloudshef/resources
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /opt/kloudshef/resources/firebase-service-account.json

            # Deploy new jar
            cp /opt/kloudshef/target/backend-0.0.1-SNAPSHOT.jar /opt/kloudshef/backend.jar

            # Restart service
            sudo systemctl restart kloudshef

            # Wait for Spring Boot to fully start (it takes ~15-20s)
            echo "Waiting for service to start..."
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(sudo systemctl is-active kloudshef)
              echo "[$i] Service status: $STATUS"
              if [ "$STATUS" = "active" ]; then
                echo "Service started successfully!"
                exit 0
              fi
            done
            echo "Service did not start in time — checking logs:"
            sudo journalctl -u kloudshef --no-pager -n 30
            exit 1
